<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>함대 컨트롤</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #0b0d10; color: #e8eaed; font: 16px/1.5 -apple-system, system-ui, sans-serif; padding: 16px; }
  .empty { opacity: .5; text-align: center; margin: 20px 0; }
  .card { background: #16191d; border-radius: 16px; padding: 20px; max-width: 620px; margin: 0 auto; }
  .title { font-size: 20px; font-weight: 700; margin: 0 0 16px; }
  .sec-label { font-size: 12px; letter-spacing: .08em; color: #8a929b; margin: 16px 0 4px; text-transform: uppercase; }
  .sec { margin: 0; }
  .payoff { background: #1e2228; border-radius: 10px; padding: 12px; font-weight: 600; }
  .opts { display: flex; gap: 10px; margin: 20px 0 8px; }
  .opt { flex: 1; border: 0; border-radius: 12px; background: #23272e; color: #e8eaed; font-size: 22px; font-weight: 700; padding: 20px 0; cursor: pointer; }
  .opt:active { transform: scale(.97); }
  .opt .lab { display: block; font-size: 12px; font-weight: 500; opacity: .7; margin-top: 6px; }
  textarea { width: 100%; background: #1e2228; border: 1px solid #2b3038; border-radius: 12px; color: #e8eaed; padding: 12px; font: inherit; min-height: 64px; }
  .send { margin-top: 10px; width: 100%; border: 0; border-radius: 12px; background: #d2603a; color: #fff; font-size: 16px; font-weight: 700; padding: 14px; cursor: pointer; }
  .sessions { max-width: 620px; margin: 16px auto 0; }
  .proj { margin-bottom: 14px; }
  .proj h3 { font-size: 13px; color: #8a929b; margin: 0 0 6px; text-transform: uppercase; letter-spacing: .06em; }
  .srow { display: flex; align-items: center; gap: 8px; background: #16191d; border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; }
  .srow .dot { font-size: 10px; }
  .srow .name { flex: 1; font-size: 13px; color: #c7ccd1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .srow button { border: 0; border-radius: 8px; background: #23272e; color: #e8eaed; padding: 6px 10px; font-size: 12px; cursor: pointer; }
  .srow button.kill { background: #3a1e1e; color: #f0a; }
  .srow .badge { color: #f5a623; font-size: 12px; }
  .newbtn { background: #1e2f22 !important; color: #7ee2a8 !important; }
  .card .who { font-size: 12px; color: #7ee2a8; margin: -8px 0 12px; }
  .addproj { max-width: 620px; margin: 8px auto 0; display: flex; flex-wrap: wrap; gap: 6px; }
  .addproj .lbl { flex: 1 1 100%; font-size: 12px; color: #8a929b; text-transform: uppercase; letter-spacing: .06em; }
  .addproj input { flex: 1 1 100%; background: #1e2228; border: 1px solid #2b3038; border-radius: 10px; color: #e8eaed; padding: 10px; font: inherit; font-size: 14px; }
  .addproj button { border: 0; border-radius: 10px; background: #1e2f22; color: #7ee2a8; padding: 10px 14px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .addproj .addmsg { flex: 1 1 100%; font-size: 12px; color: #8a929b; min-height: 14px; }
  .avail { background: #14171b; border-radius: 10px; padding: 6px 10px; margin: 0 0 6px; }
  .a-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-top: 1px solid #23272e; }
  .a-row:first-child { border-top: 0; }
  .a-meta { flex: 1; min-width: 0; }
  .a-snip { font-size: 13px; color: #c7ccd1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .a-sub { font-size: 11px; color: #6b727a; }
  .a-row button { border: 0; border-radius: 8px; background: #1e2f22; color: #7ee2a8; padding: 6px 10px; font-size: 12px; cursor: pointer; }
  .discbtn { background: #1a1f26 !important; color: #8a929b !important; }
  .a-hint { font-size: 11px; color: #6b727a; padding: 4px 0; }
  #allsessions { max-width: 620px; margin: 12px auto 0; }
  .lbl2 { font-size: 12px; color: #8a929b; text-transform: uppercase; letter-spacing: .06em; margin: 0 0 6px; }
  .a-run { color: #7ee2a8; }
  #settings { max-width: 620px; margin: 18px auto; }
  #settings select { background: #1e2228; color: #e8eaed; border: 1px solid #2b3038; border-radius: 8px; padding: 8px 10px; font: inherit; font-size: 14px; }
  #settings .setrow { margin-bottom: 8px; }
</style>
</head>
<body>
<div id="root"><div class="empty">대기 중인 결정이 없어요</div></div>
<div id="allsessions"></div>
<div id="addproj" class="addproj">
  <div class="lbl">프로젝트 추가</div>
  <input id="pname" placeholder="이름 (예: myapp)" autocapitalize="off" autocorrect="off" spellcheck="false" />
  <input id="ppath" placeholder="repo 절대경로 (예: /Users/you/work/myapp)" autocapitalize="off" autocorrect="off" spellcheck="false" />
  <button id="paddbtn">+ 추가</button>
  <div id="addmsg" class="addmsg"></div>
</div>
<div id="sessions" class="sessions"></div>
<div id="settings"></div>
<script>
  const token = new URLSearchParams(location.search).get("token") || "";
  const q = (s) => `${s}${s.includes("?") ? "&" : "?"}token=${encodeURIComponent(token)}`;
  let currentId = null;
  let showAll = false;
  let allCache = [];

  async function poll() {
    try {
      const list = await (await fetch(q("/api/decisions"))).json();
      render(list[0] || null);
    } catch (e) { /* 네트워크 끊김은 다음 폴에서 복구 */ }
    setTimeout(poll, 1500);
  }

  function esc(s) { return String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

  function render(item) {
    const root = document.getElementById("root");
    if (!item) { currentId = null; root.innerHTML = '<div class="empty">대기 중인 결정이 없어요</div>'; return; }
    if (item.id === currentId) return; // 렌더 중 입력 유지
    currentId = item.id;
    const r = item.request;
    const opts = r.options.map((o) =>
      `<button class="opt" data-n="${Number(o.n)}">${Number(o.n)}<span class="lab">${esc(o.label)}</span></button>`).join("");
    root.innerHTML = `
      <div class="card">
        <p class="title">${esc(r.title)}</p>
        ${item.session ? `<p class="who">▸ ${item.session.label ? esc(item.session.label) : esc(item.session.project + " · " + item.session.tmuxName)}</p>` : ""}
        <div class="sec-label">지금 왜?</div><p class="sec">${esc(r.why_now)}</p>
        <div class="sec-label">THE PAYOFF</div><p class="sec payoff">${esc(r.payoff)}</p>
        <div class="sec-label">트레이드오프</div><p class="sec">${esc(r.tradeoff)}</p>
        ${r.context ? `<div class="sec-label">알아두면 좋은 맥락</div><p class="sec">${esc(r.context)}</p>` : ""}
        <div class="opts">${opts}</div>
        ${r.allow_freetext ? '<textarea id="memo" placeholder="예: 2번으로 가자. 대신 배포 전 한 번 더 확인해줘."></textarea><button class="send" id="send">메모로 답하기</button>' : ""}
      </div>`;
    root.querySelectorAll(".opt").forEach((b) =>
      b.addEventListener("click", () => answer({ choice: Number(b.dataset.n) })));
    const send = document.getElementById("send");
    if (send) send.addEventListener("click", () => {
      const memo = document.getElementById("memo").value.trim();
      answer({ memo });
    });
  }

  async function answer(body) {
    if (!currentId) return;
    await fetch(q(`/api/decisions/${currentId}/answer`), {
      method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body),
    });
    currentId = null;
    document.getElementById("root").innerHTML = '<div class="empty">보냈어요 ✓</div>';
  }

  async function pollSessions() {
    try {
      const [projects, sessions] = await Promise.all([
        fetch(q("/api/projects")).then((r) => r.json()),
        fetch(q("/api/sessions")).then((r) => r.json()),
      ]);
      renderSessions(projects, sessions);
    } catch (e) { /* retry next tick */ }
    setTimeout(pollSessions, 2000);
  }
  function renderSessions(projects, sessions) {
    const el = document.getElementById("sessions");
    el.innerHTML = projects.map((p) => {
      const rows = sessions.filter((s) => s.project === p.name).map((s) => {
        const running = s.status === "running";
        const badge = s.notice ? `<span class="badge" title="${esc(s.notice.message)}">⚠️</span>` : "";
        const btns = running
          ? `<button data-act="open" data-id="${esc(s.id)}">맥에서 열기</button><button class="kill" data-act="close" data-id="${esc(s.id)}">닫기</button>`
          : `<button data-act="resume" data-id="${esc(s.id)}">resume</button>`;
        return `<div class="srow"><span class="dot">${running ? "🟢" : "⚪️"}</span><span class="name">${esc(s.label || s.tmuxName)}</span>${badge}<button data-act="rename" data-id="${esc(s.id)}" data-label="${esc(s.label || "")}">✏️</button>${btns}</div>`;
      }).join("");
      return `<div class="proj"><h3>${esc(p.name)}</h3>${rows}<div class="srow"><button class="newbtn" data-act="new" data-proj="${esc(p.name)}">+ 새 세션</button></div></div>`;
    }).join("");
    el.querySelectorAll("button[data-act]").forEach((b) => b.addEventListener("click", () => sessionAction(b.dataset)));
  }
  async function sessionAction(d) {
    if (d.act === "new") await fetch(q("/api/sessions"), { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ project: d.proj }) });
    else if (d.act === "resume") await fetch(q(`/api/sessions/${d.id}/resume`), { method: "POST" });
    else if (d.act === "close") await fetch(q(`/api/sessions/${d.id}/close`), { method: "POST" });
    else if (d.act === "open") await fetch(q(`/api/sessions/${d.id}/open-terminal`), { method: "POST" });
    else if (d.act === "rename") {
      const name = prompt("세션 이름:", d.label || "");
      if (name === null) return;
      await fetch(q(`/api/sessions/${d.id}/label`), { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ label: name.trim() }) });
    }
    else if (d.act === "adopt-path") {
      if (d.running === "1" && !confirm("이 세션 지금 실행 중이에요.\n원래 터미널을 먼저 닫았나요? 안 닫으면 충돌해요.")) return;
      await fetch(q("/api/sessions/adopt"), { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ id: d.id, projectPath: d.path }) });
    }
    else if (d.act === "show-all") { showAll = true; await loadAll(); }
    else if (d.act === "hide-all") { showAll = false; }
    pollSessions();
    renderAll();
  }

  async function loadAll() {
    try {
      const list = await fetch(q("/api/all-sessions")).then((r) => r.json());
      allCache = Array.isArray(list) ? list : [];
    } catch (e) { /* keep last cache */ }
  }
  async function pollAll() {
    if (showAll) { await loadAll(); renderAll(); } // only refresh while open
    setTimeout(pollAll, 5000);
  }
  function renderAll() {
    const el = document.getElementById("allsessions");
    if (!showAll) {
      el.innerHTML = `<div class="srow"><button class="discbtn" data-act="show-all">＋ 기존 세션 가져오기 (모든 프로젝트)</button></div>`;
    } else {
      el.innerHTML = `<div class="lbl2">내 세션 (최근 · 🟢=실행 중)</div>`
        + `<div class="a-hint">⚠️ 실행 중(🟢) 세션은 원래 터미널을 먼저 닫고 가져와요(안 그러면 충돌).</div>`
        + (allCache.length ? allCache.map((s) =>
            `<div class="a-row"><div class="a-meta"><div class="a-snip">${s.running ? '<span class="a-run">🟢</span> ' : ""}${esc(s.snippet || "(미리보기 없음)")}</div><div class="a-sub">${esc(s.projectName)} · ${esc((s.mtime || "").slice(5, 16).replace("T", " "))}</div></div><button data-act="adopt-path" data-id="${esc(s.id)}" data-path="${esc(s.projectPath)}" data-running="${s.running ? "1" : "0"}">가져오기</button></div>`).join("")
           : `<div class="a-hint">불러오는 중…</div>`)
        + `<div class="srow"><button class="discbtn" data-act="hide-all">닫기</button></div>`;
    }
    el.querySelectorAll("button[data-act]").forEach((b) => b.addEventListener("click", () => sessionAction(b.dataset)));
  }

  async function addProject() {
    const name = document.getElementById("pname").value.trim();
    const path = document.getElementById("ppath").value.trim();
    const msg = document.getElementById("addmsg");
    if (!name || !path) { msg.textContent = "이름과 절대경로를 둘 다 입력해줘"; return; }
    try {
      const res = await fetch(q("/api/projects"), {
        method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ name, path }),
      });
      if (res.ok) {
        msg.textContent = `추가됨: ${name} — 아래 목록에서 "+ 새 세션" 눌러`;
        document.getElementById("pname").value = "";
        document.getElementById("ppath").value = "";
        pollSessions();
      } else {
        msg.textContent = "추가 실패 (토큰/서버 확인)";
      }
    } catch (e) {
      msg.textContent = "네트워크 오류";
    }
  }
  document.getElementById("paddbtn").addEventListener("click", addProject);

  const PERM_MODES = [
    { id: "auto", name: "자동 (권장 · 안전한 건 알아서)" },
    { id: "acceptEdits", name: "편집만 자동" },
    { id: "bypassPermissions", name: "전부 자동 (무인)" },
    { id: "manual", name: "매번 물어봄" },
    { id: "plan", name: "계획만 (실행 안 함)" },
  ];
  async function loadTerminals() {
    try {
      const [terms, perm] = await Promise.all([
        fetch(q("/api/terminals")).then((r) => r.json()),
        fetch(q("/api/permission-mode")).then((r) => r.json()),
      ]);
      const el = document.getElementById("settings");
      let html = "";
      if (terms.detected && terms.detected.length) {
        html += `<div class="setrow"><span class="lbl2">"맥에서 열기" 터미널</span> <select id="termsel">`
          + terms.detected.map((t) => `<option value="${esc(t.id)}"${t.id === terms.current ? " selected" : ""}>${esc(t.name)}</option>`).join("")
          + `</select></div>`;
      }
      html += `<div class="setrow"><span class="lbl2">새 세션 권한 모드</span> <select id="permsel">`
        + PERM_MODES.map((m) => `<option value="${esc(m.id)}"${m.id === perm.current ? " selected" : ""}>${esc(m.name)}</option>`).join("")
        + `</select></div>`;
      el.innerHTML = html;
      const ts = document.getElementById("termsel");
      if (ts) ts.addEventListener("change", (e) => fetch(q("/api/terminal"), { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ terminal: e.target.value }) }));
      document.getElementById("permsel").addEventListener("change", (e) => fetch(q("/api/permission-mode"), { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ mode: e.target.value }) }));
    } catch (e) { /* ignore */ }
  }

  poll();
  pollSessions();
  renderAll();
  pollAll();
  loadTerminals();
</script>
</body>
</html>
