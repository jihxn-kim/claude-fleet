<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>함대 컨트롤</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #0b0d10; color: #e8eaed; font: 16px/1.5 -apple-system, system-ui, sans-serif; padding: 16px; }
  .empty { opacity: .5; text-align: center; margin: 16px 0; font-size: 13px; }

  /* 탭 */
  .tabs { max-width: 820px; margin: 0 auto 16px; display: flex; gap: 6px; }
  .tab { flex: 1; position: relative; border: 0; border-radius: 12px; background: #16191d; color: #8a929b; padding: 12px; font: inherit; font-size: 15px; font-weight: 600; cursor: pointer; }
  .tab.active { background: #23272e; color: #e8eaed; }
  .tab .cnt { display: none; margin-left: 6px; background: #d2603a; color: #fff; font-size: 12px; font-weight: 700; border-radius: 999px; padding: 1px 8px; vertical-align: middle; }
  .panel[hidden] { display: none; }
  .wrap { max-width: 820px; margin: 0 auto; }

  /* 결정 카드 */
  #decisions, #prompts { max-width: 640px; margin: 0 auto 14px; }
  #decisions:empty, #prompts:empty { margin: 0; }
  .pctx { background: #0e1114; border: 1px solid #23272e; border-radius: 8px; padding: 10px; margin-top: 10px; font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace; color: #c7ccd1; white-space: pre; overflow: auto; max-height: 220px; }
  .popts { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .popt { text-align: left; border: 0; border-radius: 10px; background: #23272e; color: #e8eaed; padding: 12px 14px; font: inherit; font-size: 14px; cursor: pointer; line-height: 1.35; }
  .popt:hover { background: #2b3038; }
  .popt:disabled { opacity: .5; }
  .popt.sel { background: #24402c; box-shadow: inset 0 0 0 2px #7ee2a8; }
  .popt b { color: #7ee2a8; margin-right: 8px; }
  .mtag { font-size: 11px; color: #7ee2a8; font-weight: 600; }
  .card.prompt { border-color: #1e3326; }
  .sec-h { max-width: 640px; margin: 0 auto 8px; font-size: 12px; letter-spacing: .06em; color: #f5a623; text-transform: uppercase; font-weight: 700; }
  .card { background: #16191d; border-radius: 16px; padding: 18px 20px; margin-bottom: 12px; border: 1px solid #2a2320; }
  .dhead { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 700; color: #f5c07a; }
  .dhead .tag { font-size: 16px; }
  .dpath { font-size: 11px; color: #6b727a; margin: 2px 0 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: ui-monospace, monospace; }
  .title { font-size: 19px; font-weight: 700; margin: 0 0 14px; }
  .sec-label { font-size: 12px; letter-spacing: .08em; color: #8a929b; margin: 14px 0 4px; text-transform: uppercase; }
  .sec { margin: 0; }
  .payoff { background: #1e2228; border-radius: 10px; padding: 12px; font-weight: 600; }
  .opts { display: flex; flex-wrap: wrap; gap: 10px; margin: 18px 0 8px; }
  .opt { flex: 1 1 28%; min-width: 84px; border: 0; border-radius: 12px; background: #23272e; color: #e8eaed; font-size: 22px; font-weight: 700; padding: 18px 0; cursor: pointer; }
  .opt:active { transform: scale(.97); }
  .opt.sel { background: #24402c; box-shadow: inset 0 0 0 2px #7ee2a8; color: #fff; }
  .opt .lab { display: block; font-size: 12px; font-weight: 500; opacity: .7; margin-top: 6px; }
  .multihint { font-size: 12px; color: #7ee2a8; margin: 14px 0 -6px; }
  textarea { width: 100%; background: #1e2228; border: 1px solid #2b3038; border-radius: 12px; color: #e8eaed; padding: 12px; font: inherit; min-height: 60px; margin-top: 8px; }
  .send { margin-top: 10px; width: 100%; border: 0; border-radius: 12px; background: #d2603a; color: #fff; font-size: 16px; font-weight: 700; padding: 14px; cursor: pointer; }

  /* 보드 (작업중 | 완료 | 비활성화) */
  .board { display: flex; gap: 10px; align-items: flex-start; overflow-x: auto; padding-bottom: 4px; }
  .col { flex: 1 1 0; min-width: 190px; background: #101317; border-radius: 14px; padding: 10px; }
  .col-head { font-size: 13px; font-weight: 700; color: #cfd4da; margin: 2px 4px 10px; display: flex; align-items: center; gap: 6px; }
  .col-head .n { background: #23272e; color: #c7ccd1; border-radius: 999px; font-size: 11px; padding: 1px 7px; font-weight: 700; }
  .col.busy .col-head { color: #6ab0ff; }
  .col.wait .col-head { color: #f5a623; }
  .col.idle .col-head { color: #7ee2a8; }
  .col.off .col-head { color: #6b727a; }
  .col.wait { box-shadow: inset 0 0 0 1px #3a3018; }
  .scard { background: #16191d; border-radius: 12px; padding: 12px; margin-bottom: 8px; }
  .col.off .scard { opacity: .72; }
  .scard .top { display: flex; align-items: center; gap: 6px; }
  .scard .dot { font-size: 9px; }
  .scard .nm { flex: 1; font-size: 14px; font-weight: 600; color: #e8eaed; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .scard .nm.clickable { cursor: pointer; }
  .scard .nm.clickable:hover { text-decoration: underline; }
  .scard .rc { color: #7ee2a8; display: inline-flex; }
  .scard .badge { color: #f5a623; font-size: 13px; }
  .scard .rename { border: 0; background: none; color: #6b727a; cursor: pointer; padding: 0 2px; display: inline-flex; align-items: center; }
  .scard .rename:hover { color: #c7ccd1; }
  .ic { vertical-align: -3px; }
  .scard .btns button .ic { vertical-align: -3px; margin-right: 1px; }
  .scard .del { border: 0; background: none; color: #6b727a; cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1; }
  .scard .del:hover { color: #f4718a; }
  .scard .pj { font-size: 11px; color: #6b727a; margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .scard .btns { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .scard .btns button { flex: 1 1 auto; border: 0; border-radius: 8px; background: #23272e; color: #e8eaed; padding: 8px 6px; font-size: 12px; cursor: pointer; }
  .scard .btns button.go { background: #1e2f22; color: #7ee2a8; }

  /* 새 세션 런처 */
  .launcher { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin: 14px auto 0; }
  .launcher .ll { font-size: 12px; color: #8a929b; }
  .launcher button { border: 0; border-radius: 999px; background: #1e2f22; color: #7ee2a8; padding: 7px 12px; font-size: 13px; font-weight: 600; cursor: pointer; }

  /* 관리 탭 */
  .srow { display: flex; align-items: center; gap: 8px; background: #16191d; border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; }
  .srow button { border: 0; border-radius: 8px; background: #23272e; color: #e8eaed; padding: 6px 10px; font-size: 12px; cursor: pointer; }
  .addproj { max-width: 640px; margin: 0 auto 16px; display: flex; flex-wrap: wrap; gap: 6px; }
  .addproj .lbl { flex: 1 1 100%; font-size: 12px; color: #8a929b; text-transform: uppercase; letter-spacing: .06em; }
  .addproj input { flex: 1 1 100%; background: #1e2228; border: 1px solid #2b3038; border-radius: 10px; color: #e8eaed; padding: 10px; font: inherit; font-size: 14px; }
  .addproj button { border: 0; border-radius: 10px; background: #1e2f22; color: #7ee2a8; padding: 10px 14px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .addproj .addmsg { flex: 1 1 100%; font-size: 12px; color: #8a929b; min-height: 14px; }
  .a-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-top: 1px solid #23272e; }
  .a-row:first-child { border-top: 0; }
  .a-meta { flex: 1; min-width: 0; }
  .a-snip { font-size: 13px; color: #c7ccd1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .a-sub { font-size: 11px; color: #6b727a; }
  .a-row button { border: 0; border-radius: 8px; background: #1e2f22; color: #7ee2a8; padding: 6px 10px; font-size: 12px; cursor: pointer; }
  .discbtn { background: #1a1f26 !important; color: #8a929b !important; }
  .a-hint { font-size: 11px; color: #6b727a; padding: 4px 0; }
  #allsessions { max-width: 640px; margin: 0 auto 18px; }
  .lbl2 { font-size: 12px; color: #8a929b; text-transform: uppercase; letter-spacing: .06em; margin: 0 0 6px; }
  .a-run { color: #7ee2a8; }
  .sec-head { max-width: 640px; margin: 0 auto 6px; font-size: 13px; color: #8a929b; text-transform: uppercase; letter-spacing: .06em; }
  #settings { max-width: 640px; margin: 0 auto; }
  #settings select { background: #1e2228; color: #e8eaed; border: 1px solid #2b3038; border-radius: 8px; padding: 8px 10px; font: inherit; font-size: 14px; }
  #settings .setrow { margin-bottom: 8px; }
  .qrcard { max-width: 640px; margin: 0 auto 18px; background: #16191d; border-radius: 12px; padding: 16px; text-align: center; }
  .qrcard .lbl { font-size: 12px; color: #8a929b; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; text-align: left; }
  .qrbox { background: #fff; border-radius: 10px; padding: 12px; display: inline-block; line-height: 0; min-width: 120px; min-height: 40px; color: #16191d; font-size: 13px; }
  .qrbox svg { width: 220px; height: 220px; display: block; }
  .qrurl { margin-top: 10px; font-size: 12px; color: #8a929b; word-break: break-all; }
  .qrhint { margin-top: 4px; font-size: 11px; color: #6b727a; }
  .qrcopy { margin-top: 10px; border: 0; border-radius: 10px; background: #23272e; color: #e8eaed; padding: 8px 14px; font: inherit; font-size: 13px; cursor: pointer; }
</style>
</head>
<body>
<div class="tabs">
  <button class="tab active" data-tab="main">결정 &amp; 세션<span class="cnt" id="pcount"></span></button>
  <button class="tab" data-tab="manage">관리</button>
</div>

<div id="tab-main" class="panel">
  <div class="sec-h" id="dec-h" hidden>⚡ 결정 필요</div>
  <div id="prompts"></div>
  <div class="wrap">
    <div class="board">
      <div class="col off"><div class="col-head">⚫ 비활성화 <span class="n" id="n-off">0</span></div><div id="col-off"></div></div>
      <div class="col busy"><div class="col-head">🔵 작업중 <span class="n" id="n-busy">0</span></div><div id="col-busy"></div></div>
      <div class="col wait"><div class="col-head">⏳ 대기 <span class="n" id="n-wait">0</span></div><div id="col-wait"></div></div>
      <div class="col idle"><div class="col-head">✅ 완료 <span class="n" id="n-idle">0</span></div><div id="col-idle"></div></div>
    </div>
    <div class="launcher" id="launcher"></div>
  </div>
</div>

<div id="tab-manage" class="panel" hidden>
  <div class="qrcard" id="qrcard">
    <div class="lbl">폰으로 접속</div>
    <div class="qrbox" id="qrbox">불러오는 중…</div>
    <div class="qrurl" id="qrurl"></div>
    <div class="qrhint" id="qrhint"></div>
    <button class="qrcopy" id="qrcopy" hidden>링크 복사</button>
  </div>
  <div class="addproj" id="addproj">
    <div class="lbl">프로젝트 추가</div>
    <input id="pname" placeholder="이름 (예: myapp)" autocapitalize="off" autocorrect="off" spellcheck="false" />
    <input id="ppath" placeholder="repo 절대경로 (예: /Users/you/work/myapp)" autocapitalize="off" autocorrect="off" spellcheck="false" />
    <button id="paddbtn">+ 추가</button>
    <div id="addmsg" class="addmsg"></div>
  </div>
  <div id="allsessions"></div>
  <div class="sec-head">설정</div>
  <div id="settings"></div>
</div>

<script>
  const token = new URLSearchParams(location.search).get("token") || "";
  const q = (s) => `${s}${s.includes("?") ? "&" : "?"}token=${encodeURIComponent(token)}`;
  let showAll = false;
  let allCache = [];

  // 라인 아이콘 (이모지 대신)
  const IC = {
    edit: '<svg class="ic" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h4L18.5 9.5a2 2 0 0 0-3-3L5 17v3Z"/><path d="M13.5 6.5l4 4"/></svg>',
    remote: '<svg class="ic" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9a9 9 0 0 1 14 0"/><path d="M7.5 11.8a5.5 5.5 0 0 1 9 0"/><circle cx="12" cy="15.5" r="1.5" fill="currentColor" stroke="none"/></svg>',
  };

  function esc(s) { return String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

  // 탭 전환
  let qrLoaded = false;
  document.querySelectorAll(".tab").forEach((t) => t.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach((x) => x.classList.toggle("active", x === t));
    const name = t.dataset.tab;
    document.getElementById("tab-main").hidden = name !== "main";
    document.getElementById("tab-manage").hidden = name !== "manage";
    if (name === "manage" && !qrLoaded) { qrLoaded = true; loadPanelQr(); }
  }));

  // 관리 탭: 폰 접속용 QR (Tailscale 주소+토큰). 토큰이 들어가므로 서버가 로컬 생성.
  async function loadPanelQr() {
    const box = document.getElementById("qrbox");
    try {
      const d = await (await fetch(q("/api/panel-url"))).json();
      box.innerHTML = d.svg;
      document.getElementById("qrurl").textContent = d.url;
      document.getElementById("qrhint").textContent = d.viaTailscale
        ? `Tailscale ${d.host} · 폰 카메라로 스캔`
        : `⚠ Tailscale 미감지 — ${d.host} 는 로컬 전용일 수 있음`;
      const copy = document.getElementById("qrcopy");
      copy.hidden = false;
      copy.onclick = async () => {
        try { await navigator.clipboard.writeText(d.url); copy.textContent = "복사됨 ✓"; setTimeout(() => (copy.textContent = "링크 복사"), 1500); }
        catch { copy.textContent = "복사 불가"; }
      };
    } catch (e) {
      box.textContent = "QR 불러오기 실패";
    }
  }

  // "⚡ 결정 필요" 헤더/배지 = 화면에 뜬 프롬프트 개수
  function updateDecHeader() {
    const total = document.getElementById("prompts").children.length;
    document.getElementById("dec-h").hidden = total === 0;
    const badge = document.getElementById("pcount");
    badge.textContent = total ? String(total) : "";
    badge.style.display = total ? "inline-block" : "none";
  }
  // 세션 화면에 뜬 네이티브 선택메뉴(권한/AskUserQuestion/yes-no/…)를 카드로 미러링
  // Prompt cards are reconciled (not full-innerHTML each poll) so multi-select toggles
  // and half-typed memos survive the 2s refresh while the same menu is up.
  function renderPrompts(sessions) {
    const withPrompt = sessions.filter((s) => s.status === "running" && s.prompt && s.prompt.options && s.prompt.options.length);
    const el = document.getElementById("prompts");
    const want = new Map(withPrompt.map((s) => [s.id, s]));
    [...el.children].forEach((c) => { if (!want.has(c.dataset.sid)) c.remove(); });
    for (const s of withPrompt) {
      const sig = (s.prompt.multiSelect ? "m|" : "s|") + (s.prompt.context || "") + "|" + s.prompt.options.map((o) => o.n + o.label).join(",");
      const existing = [...el.children].find((c) => c.dataset.sid === s.id);
      if (existing && existing.dataset.sig === sig) continue; // unchanged → keep toggles/memo
      const card = buildPromptCard(s, sig);
      if (existing) existing.replaceWith(card); else el.appendChild(card);
    }
    updateDecHeader();
  }
  function buildPromptCard(s, sig) {
    const multi = !!s.prompt.multiSelect;
    const id = s.id;
    const el = document.createElement("div");
    el.className = "card prompt";
    el.dataset.sid = id;
    el.dataset.sig = sig;
    const ctx = s.prompt.context ? `<pre class="pctx">${esc(s.prompt.context)}</pre>` : "";
    // "Type something"(자유입력) / "Chat about this"(대화 전환)는 옵션 클릭 대상이 아님 —
    // 자유입력은 아래 메모칸으로만. 버튼에서 뺀다.
    const clickable = s.prompt.options.filter((o) => !/^\s*(type something|chat about this)\b/i.test(o.label));
    const opts = clickable.map((o) =>
      `<button class="popt${multi ? " mpopt" : ""}" data-n="${Number(o.n)}"><b>${Number(o.n)}</b>${esc(o.label)}</button>`).join("");
    const submitBtn = multi ? `<button class="send mpsubmit">선택 완료</button>` : "";
    const hasMemo = s.prompt.options.some((o) => /type something/i.test(o.label));
    const memoBox = hasMemo ? `<textarea class="pmemo" placeholder="메모로 답하기 — Enter 전송, Shift+Enter 줄바꿈"></textarea><button class="send pmemo-send">메모 전송</button>` : "";
    el.innerHTML = `
      <div class="dhead"><span class="tag">▸</span> ${esc(s.label || s.tmuxName)}${multi ? ' <span class="mtag">여러 개 선택</span>' : ""}</div>
      <div class="dpath">${esc(s.projectPath || s.project || "")}</div>
      ${ctx}
      <div class="popts">${opts}</div>
      ${submitBtn}
      ${memoBox}`;
    el.querySelectorAll(".popt").forEach((b) => b.addEventListener("click", () => {
      if (multi) {
        b.classList.toggle("sel");
        const n = el.querySelectorAll(".mpopt.sel").length;
        const sb = el.querySelector(".mpsubmit");
        if (sb) sb.textContent = n ? `선택 완료 (${n}개)` : "선택 완료";
      } else {
        el.querySelectorAll(".popt").forEach((x) => (x.disabled = true));
        sendPrompt(`/api/sessions/${id}/prompt-answer`, { n: Number(b.dataset.n) });
      }
    }));
    const sub = el.querySelector(".mpsubmit");
    if (sub) sub.addEventListener("click", () => {
      const ns = [...el.querySelectorAll(".mpopt.sel")].map((x) => Number(x.dataset.n));
      if (!ns.length) return;
      sub.disabled = true;
      sendPrompt(`/api/sessions/${id}/prompt-multi`, { ns }, sub);
    });
    const ms = el.querySelector(".pmemo-send");
    if (ms) {
      const submitMemo = () => {
        const box = el.querySelector(".pmemo");
        const text = (box.value || "").trim();
        if (!text) { box.focus(); return; }
        ms.disabled = true;
        sendPrompt(`/api/sessions/${id}/prompt-memo`, { text }, ms);
      };
      ms.addEventListener("click", submitMemo);
      // Enter sends, Shift+Enter (and IME composition) inserts a newline.
      el.querySelector(".pmemo").addEventListener("keydown", (ev) => {
        if (ev.key !== "Enter" || ev.shiftKey || ev.isComposing || ev.keyCode === 229) return;
        ev.preventDefault();
        if (!ms.disabled) submitMemo();
      });
    }
    return el;
  }
  async function sendPrompt(url, body, btn) {
    try {
      const res = await fetch(q(url), { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body) });
      if (!res.ok) { const j = await res.json().catch(() => ({})); alert(j.error || "전송 실패"); if (btn) btn.disabled = false; }
    } catch (e) { if (btn) btn.disabled = false; }
    pollSessions();
  }
  // ---- 세션 보드 ----
  async function pollSessions() {
    try {
      const [projects, sessions] = await Promise.all([
        fetch(q("/api/projects")).then((r) => r.json()),
        fetch(q("/api/sessions")).then((r) => r.json()),
      ]);
      const ss = Array.isArray(sessions) ? sessions : [];
      renderBoard(ss);
      renderLauncher(Array.isArray(projects) ? projects : []);
      renderPrompts(ss);
    } catch (e) { /* retry next tick */ }
    setTimeout(pollSessions, 2000);
  }
  function sessionCard(s) {
    const running = s.status === "running";
    const rc = running && s.remoteActive ? `<span class="rc" title="원격제어 연결됨 (Claude 앱)">${IC.remote}</span>` : "";
    const lbl = esc(s.label || s.tmuxName);
    const nameEl = running
      ? `<span class="nm clickable" data-act="fg" data-id="${esc(s.id)}" title="포그라운드로 전환(터미널 창)">${lbl}</span>`
      : `<span class="nm">${lbl}</span>`;
    let btns;
    if (running) {
      const term = s.terminalOpen
        ? `<button data-act="bg" data-id="${esc(s.id)}">⬇︎ 백그라운드</button>`
        : `<button class="go" data-act="fg" data-id="${esc(s.id)}">⬆︎ 포그라운드</button>`;
      const remote = `<button data-act="remote" data-id="${esc(s.id)}" data-disconnect="${s.remoteActive ? "1" : "0"}">${IC.remote} ${s.remoteActive ? "원격 해제" : "원격 연결"}</button>`;
      btns = `${term}${remote}<button data-act="deactivate" data-id="${esc(s.id)}">⏸ 비활성화</button>`;
    } else {
      btns = `<button class="go" data-act="resume" data-id="${esc(s.id)}">▶ 활성화</button>`;
    }
    return `<div class="scard">
        <div class="top"><span class="dot">${running ? "🟢" : "⚫"}</span>${nameEl}${rc}<button class="rename" data-act="rename" data-id="${esc(s.id)}" data-label="${esc(s.label || "")}" title="이름 변경">${IC.edit}</button><button class="del" data-act="terminate" data-id="${esc(s.id)}" data-label="${lbl}" title="프로젝트에서 삭제 (로컬 기록은 남음)">✕</button></div>
        <div class="pj">${esc(s.project)}</div>
        <div class="btns">${btns}</div>
      </div>`;
  }
  function renderBoard(sessions) {
    const running = sessions.filter((s) => s.status === "running");
    const needsYou = (s) => s.prompt; // 화면에 선택메뉴 떠서 입력 대기중
    const waiting = running.filter(needsYou);
    const busy = running.filter((s) => !needsYou(s) && s.activity === "busy");
    const idle = running.filter((s) => !needsYou(s) && s.activity !== "busy");
    const off = sessions.filter((s) => s.status !== "running");
    const fill = (colId, nId, list) => {
      document.getElementById(colId).innerHTML = list.length ? list.map(sessionCard).join("") : '<div class="empty">없음</div>';
      document.getElementById(nId).textContent = list.length;
    };
    fill("col-off", "n-off", off);
    fill("col-busy", "n-busy", busy);
    fill("col-wait", "n-wait", waiting);
    fill("col-idle", "n-idle", idle);
    document.querySelectorAll(".board [data-act]").forEach((b) => b.addEventListener("click", () => sessionAction(b.dataset)));
  }
  function renderLauncher(projects) {
    const el = document.getElementById("launcher");
    if (!projects.length) { el.innerHTML = '<span class="ll">관리 탭에서 프로젝트 추가/세션 가져오기</span>'; return; }
    el.innerHTML = '<span class="ll">+ 새 세션:</span>' + projects.map((p) => `<button data-act="new" data-proj="${esc(p.name)}">${esc(p.name)}</button>`).join("");
    el.querySelectorAll("[data-act]").forEach((b) => b.addEventListener("click", () => sessionAction(b.dataset)));
  }
  async function sessionAction(d) {
    if (d.act === "new") await fetch(q("/api/sessions"), { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ project: d.proj }) });
    else if (d.act === "resume") await fetch(q(`/api/sessions/${d.id}/resume`), { method: "POST" });
    else if (d.act === "deactivate") await fetch(q(`/api/sessions/${d.id}/close`), { method: "POST" });
    else if (d.act === "fg") await fetch(q(`/api/sessions/${d.id}/open-terminal`), { method: "POST" });
    else if (d.act === "bg") await fetch(q(`/api/sessions/${d.id}/background-terminal`), { method: "POST" });
    else if (d.act === "remote") {
      const res = await fetch(q(`/api/sessions/${d.id}/remote-control`), { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ disconnect: d.disconnect === "1" }) });
      if (!res.ok) { const j = await res.json().catch(() => ({})); alert(j.error || "원격제어 요청 실패"); }
    }
    else if (d.act === "terminate") {
      if (!confirm(`'${d.label || d.id}' 을(를) 프로젝트에서 삭제할까요?\n실행 중이면 종료돼요. 로컬 대화기록은 남아서 나중에 '기존 세션 가져오기'로 되살릴 수 있어요.`)) return;
      await fetch(q(`/api/sessions/${d.id}/terminate`), { method: "POST" });
    }
    else if (d.act === "rename") {
      const name = prompt("세션 이름:", d.label || "");
      if (name === null) return;
      await fetch(q(`/api/sessions/${d.id}/label`), { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ label: name.trim() }) });
    }
    else if (d.act === "adopt-path") {
      if (d.running === "1" && !confirm("이 세션 지금 실행 중이에요.\n원래 터미널을 먼저 닫았나요? 안 닫으면 충돌해요.")) return;
      await fetch(q("/api/sessions/adopt"), { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ id: d.id, projectPath: d.path }) });
    }
    else if (d.act === "show-all") { showAll = true; await loadAll(); }
    else if (d.act === "hide-all") { showAll = false; }
    pollSessions();
    renderAll();
  }

  // ---- 관리: 기존 세션 가져오기 ----
  async function loadAll() {
    try {
      const list = await fetch(q("/api/all-sessions")).then((r) => r.json());
      allCache = Array.isArray(list) ? list : [];
    } catch (e) { /* keep last cache */ }
  }
  async function pollAll() {
    if (showAll) { await loadAll(); renderAll(); }
    setTimeout(pollAll, 5000);
  }
  function renderAll() {
    const el = document.getElementById("allsessions");
    if (!showAll) {
      el.innerHTML = `<div class="srow"><button class="discbtn" data-act="show-all">＋ 기존 세션 가져오기 (모든 프로젝트)</button></div>`;
    } else {
      el.innerHTML = `<div class="lbl2">내 세션 (최근 · 🟢=실행 중)</div>`
        + `<div class="a-hint">⚠️ 실행 중(🟢) 세션은 원래 터미널을 먼저 닫고 가져와요(안 그러면 충돌).</div>`
        + (allCache.length ? allCache.map((s) =>
            `<div class="a-row"><div class="a-meta"><div class="a-snip">${s.running ? '<span class="a-run">🟢</span> ' : ""}${esc(s.snippet || "(미리보기 없음)")}</div><div class="a-sub">${esc(s.projectName)} · ${esc((s.mtime || "").slice(5, 16).replace("T", " "))}</div></div><button data-act="adopt-path" data-id="${esc(s.id)}" data-path="${esc(s.projectPath)}" data-running="${s.running ? "1" : "0"}">가져오기</button></div>`).join("")
           : `<div class="a-hint">불러오는 중…</div>`)
        + `<div class="srow"><button class="discbtn" data-act="hide-all">닫기</button></div>`;
    }
    el.querySelectorAll("[data-act]").forEach((b) => b.addEventListener("click", () => sessionAction(b.dataset)));
  }

  async function addProject() {
    const name = document.getElementById("pname").value.trim();
    const path = document.getElementById("ppath").value.trim();
    const msg = document.getElementById("addmsg");
    if (!name || !path) { msg.textContent = "이름과 절대경로를 둘 다 입력해줘"; return; }
    try {
      const res = await fetch(q("/api/projects"), { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ name, path }) });
      if (res.ok) {
        msg.textContent = `추가됨: ${name} — "결정 & 세션" 탭에서 "+ 새 세션" 눌러`;
        document.getElementById("pname").value = "";
        document.getElementById("ppath").value = "";
        pollSessions();
      } else {
        msg.textContent = "추가 실패 (토큰/서버 확인)";
      }
    } catch (e) {
      msg.textContent = "네트워크 오류";
    }
  }
  document.getElementById("paddbtn").addEventListener("click", addProject);

  const PERM_MODES = [
    { id: "auto", name: "자동 (권장 · 안전한 건 알아서)" },
    { id: "acceptEdits", name: "편집만 자동" },
    { id: "bypassPermissions", name: "전부 자동 (무인)" },
    { id: "manual", name: "매번 물어봄" },
    { id: "plan", name: "계획만 (실행 안 함)" },
  ];
  async function loadTerminals() {
    try {
      const [terms, perm] = await Promise.all([
        fetch(q("/api/terminals")).then((r) => r.json()),
        fetch(q("/api/permission-mode")).then((r) => r.json()),
      ]);
      const el = document.getElementById("settings");
      let html = "";
      if (terms.detected && terms.detected.length) {
        html += `<div class="setrow"><span class="lbl2">"맥에서 열기" 터미널</span> <select id="termsel">`
          + terms.detected.map((t) => `<option value="${esc(t.id)}"${t.id === terms.current ? " selected" : ""}>${esc(t.name)}</option>`).join("")
          + `</select></div>`;
      }
      html += `<div class="setrow"><span class="lbl2">새 세션 권한 모드</span> <select id="permsel">`
        + PERM_MODES.map((m) => `<option value="${esc(m.id)}"${m.id === perm.current ? " selected" : ""}>${esc(m.name)}</option>`).join("")
        + `</select></div>`;
      el.innerHTML = html;
      const ts = document.getElementById("termsel");
      if (ts) ts.addEventListener("change", (e) => fetch(q("/api/terminal"), { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ terminal: e.target.value }) }));
      document.getElementById("permsel").addEventListener("change", (e) => fetch(q("/api/permission-mode"), { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ mode: e.target.value }) }));
    } catch (e) { /* ignore */ }
  }

  pollSessions();
  renderAll();
  pollAll();
  loadTerminals();
</script>
</body>
</html>
